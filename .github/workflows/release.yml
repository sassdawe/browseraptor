name: Build Installer

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-installer:
    name: Build Installer (win-x64)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BrowserAptor.slnx

      - name: Run tests
        run: dotnet test tests/BrowserAptor.Tests/BrowserAptor.Tests.csproj --no-restore -c Release

      - name: Publish self-contained executable
        run: |
          dotnet publish src/BrowserAptor/BrowserAptor.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o publish/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrowserAptor-win-x64
          path: |
            publish/
            !publish/*.pdb
          retention-days: 30
