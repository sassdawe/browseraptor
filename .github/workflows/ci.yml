name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BrowserAptor.slnx

      - name: Check for vulnerable NuGet packages
        # dotnet list package --vulnerable exits with a non-zero code when vulnerabilities are found (.NET 7+)
        run: dotnet list BrowserAptor.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build BrowserAptor.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/BrowserAptor.Tests/BrowserAptor.Tests.csproj --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7
