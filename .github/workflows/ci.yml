name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BrowserAptor.slnx

      - name: Check for vulnerable NuGet packages
        # dotnet list package --vulnerable exits with a non-zero code when vulnerabilities are found (.NET 7+)
        run: dotnet list BrowserAptor.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build BrowserAptor.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/BrowserAptor.Tests/BrowserAptor.Tests.csproj --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7
