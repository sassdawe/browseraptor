baseURL: "https://sassdawe.github.io/browseraptor/"
languageCode: en-us
title: "BrowserAptor"
theme: "PaperMod"
pagination:
  pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "BrowserAptor"
  description: "A lightweight Windows browser selector — choose which browser and profile opens every link."
  author: "BrowserAptor Contributors"
  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon.ico"
    favicon32x32: "/favicon.ico"
    apple_touch_icon: "/favicon.ico"
    safari_pinned_tab: "/favicon.ico"

  label:
    text: "BrowserAptor"

  homeInfoParams:
    Title: "🌐 BrowserAptor"
    Content: >
      **Browser and browser profile selector for Windows.**
      Stop guessing which browser to use — BrowserAptor intercepts every link click
      and lets you choose exactly which browser *and which profile* to open it in.
      Auto-detects Chrome, Edge, Firefox, Brave, Vivaldi, Opera, and more.

  socialIcons:
    - name: github
      title: "BrowserAptor on GitHub"
      url: "https://github.com/sassdawe/browseraptor"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/sassdawe/browseraptor/tree/main/website/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: docs
      name: Docs
      url: /docs/
      weight: 20
    - identifier: github
      name: GitHub
      url: https://github.com/sassdawe/browseraptor
      weight: 30

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
